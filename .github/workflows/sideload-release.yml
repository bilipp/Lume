name: Sideload Release

on:
  release:
    types: [published]
  # Manual re-run against an existing release tag — e.g. when a runner-side
  # build issue (missing Metal toolchain, transient SPM checkout) failed the
  # original release-triggered run. Builds the tagged code and attaches the
  # sideload assets to that release without re-cutting or moving the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to (re)build sideload assets for (e.g. v1.2.0)
        required: true

# The build jobs attach assets to the release, which requires write access to
# repo contents. The default GITHUB_TOKEN is read-only when the repo's default
# workflow permissions are restricted, causing "Resource not accessible by
# integration" on upload.
permissions:
  contents: write

# Resolved once and shared by every step (incl. checkout ref). On a release
# event this is the published tag; on manual dispatch it's the input.
env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.event.release.tag_name }}

jobs:
  build:
    name: Build ${{ matrix.platform }} Sideload
    # macos-26 (matching the macOS 26 deployment target): on macos-15 the macOS
    # icon's AssetCatalogAgent compile crashes with a dyld MediaToolbox/AVFCore
    # symbol mismatch. iOS/tvOS build here too, so all platforms share one image.
    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            destination: generic/platform=iOS
            format: ipa
          - platform: tvOS
            destination: generic/platform=tvOS
            format: ipa
          - platform: macOS
            destination: generic/platform=macOS
            format: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── Metal Toolchain ──────────────────────────────────────────────────────
      # Xcode 26 no longer bundles the Metal toolchain; without it KSPlayer's
      # Shaders.metal fails to compile ("cannot execute tool 'metal' due to
      # missing Metal Toolchain"). Download it before archiving.
      - name: Download Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      # ── Inject API key secrets (optional) ───────────────────────────────────
      # Features degrade gracefully when absent (see Scripts/inject-env.sh).
      - name: Write .env
        env:
          # Key names MUST match what Scripts/inject-env.sh reads (read_env …).
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          INTRO_DB_API_KEY: ${{ secrets.INTRO_DB_API_KEY }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
        run: |
          {
            [ -n "$TMDB_ACCESS_TOKEN" ]   && echo "TMDB_ACCESS_TOKEN=$TMDB_ACCESS_TOKEN"
            [ -n "$OMDB_API_KEY" ]        && echo "OMDB_API_KEY=$OMDB_API_KEY"
            [ -n "$INTRO_DB_API_KEY" ]    && echo "INTRO_DB_API_KEY=$INTRO_DB_API_KEY"
            [ -n "$TRAKT_CLIENT_ID" ]     && echo "TRAKT_CLIENT_ID=$TRAKT_CLIENT_ID"
            [ -n "$TRAKT_CLIENT_SECRET" ] && echo "TRAKT_CLIENT_SECRET=$TRAKT_CLIENT_SECRET"
          } > .env || true

      # ── Archive (unsigned) ───────────────────────────────────────────────────
      # CODE_SIGNING_ALLOWED=NO skips all signing. The resulting .app is unsigned;
      # users re-sign it themselves (iOS/tvOS via AltStore/Sideloadly,
      # macOS via right-click → Open to bypass Gatekeeper).
      - name: Archive (Sideload, unsigned)
        run: |
          xcodebuild archive \
            -project Lume.xcodeproj \
            -scheme Lume \
            -configuration Sideload \
            -destination '${{ matrix.destination }}' \
            -archivePath "$RUNNER_TEMP/Lume-Sideload.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ENABLE_HARDENED_RUNTIME=NO

      # ── Package: IPA (iOS / tvOS) ────────────────────────────────────────────
      # An IPA is a zip with Payload/<AppName>.app at its root.
      - name: Package IPA
        if: matrix.format == 'ipa'
        run: |
          VERSION="$RELEASE_TAG"
          APP=$(find "$RUNNER_TEMP/Lume-Sideload.xcarchive/Products" -name "*.app" | head -1)

          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r "$RUNNER_TEMP/Lume-${VERSION}-${{ matrix.platform }}-Sideload.ipa" Payload

      # ── Package: zip (macOS) ────────────────────────────────────────────────
      # ditto preserves symlinks and resource forks inside the .app bundle.
      # plain zip would break the bundle's internal structure.
      - name: Package zip
        if: matrix.format == 'zip'
        run: |
          VERSION="$RELEASE_TAG"
          APP=$(find "$RUNNER_TEMP/Lume-Sideload.xcarchive/Products" -name "*.app" | head -1)

          ditto -c -k --sequesterRsrc --keepParent \
            "$APP" \
            "$RUNNER_TEMP/Lume-${VERSION}-macOS-Sideload.zip"

      # ── Attach to release ────────────────────────────────────────────────────
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ runner.temp }}/Lume-${{ env.RELEASE_TAG }}-${{ matrix.platform }}-Sideload.${{ matrix.format }}
