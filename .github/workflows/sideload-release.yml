name: Sideload Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build Sideload IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app

      # ── Inject API key secrets (optional) ───────────────────────────────────
      # Features degrade gracefully when absent (see Scripts/inject-env.sh).
      - name: Write .env
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
        run: |
          {
            [ -n "$TMDB_API_KEY" ]      && echo "TMDB_API_KEY=$TMDB_API_KEY"
            [ -n "$OMDB_API_KEY" ]      && echo "OMDB_API_KEY=$OMDB_API_KEY"
            [ -n "$TRAKT_CLIENT_ID" ]   && echo "TRAKT_CLIENT_ID=$TRAKT_CLIENT_ID"
            [ -n "$TRAKT_CLIENT_SECRET" ] && echo "TRAKT_CLIENT_SECRET=$TRAKT_CLIENT_SECRET"
          } > .env || true

      # ── Archive (unsigned) ───────────────────────────────────────────────────
      # CODE_SIGNING_ALLOWED=NO skips all signing. The resulting .xcarchive
      # contains an unsigned .app that users re-sign with their own Apple ID
      # via AltStore, Sideloadly, etc.
      - name: Archive (Sideload, unsigned)
        run: |
          xcodebuild archive \
            -project Lume.xcodeproj \
            -scheme Lume \
            -configuration Sideload \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Lume-Sideload.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      # ── Package as IPA ───────────────────────────────────────────────────────
      # An IPA is just a zip: Payload/<AppName>.app
      # We build it manually so no exportArchive (and no signing) is needed.
      - name: Package unsigned IPA
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          APP=$(find "$RUNNER_TEMP/Lume-Sideload.xcarchive/Products" -name "*.app" | head -1)

          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP" "$RUNNER_TEMP/ipa/Payload/"

          cd "$RUNNER_TEMP/ipa"
          zip -r "$RUNNER_TEMP/Lume-${VERSION}-Sideload.ipa" Payload

      # ── Attach to release ────────────────────────────────────────────────────
      - name: Upload IPA to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/Lume-${{ github.event.release.tag_name }}-Sideload.ipa
